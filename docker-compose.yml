services:
  backend:
    build: .
    container_name: hackathon_backend
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DJANGO_SECRET_KEY: django-insecure-local-docker-key-change-me
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0,backend
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: hackathon
      DB_USER: hackathon
      DB_PASSWORD: hackathon
      DB_HOST: database
      DB_PORT: "5432"
    depends_on:
      database:
        condition: service_healthy

  database:
    image: postgres:17-alpine
    container_name: hackathon_database
    environment:
      POSTGRES_DB: hackathon
      POSTGRES_USER: hackathon
      POSTGRES_PASSWORD: hackathon
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hackathon -d hackathon"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
