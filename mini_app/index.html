<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HackathonHelperBot Mini App</title>

  <!-- Telegram -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="app">

    <!-- 🔔 ГЛОБАЛЬНОЕ СООБЩЕНИЕ -->
    <div id="message" class="message hidden"></div>

    <!-- 🏠 ГЛАВНАЯ -->
    <section id="home-screen" class="screen active">
      <div class="hero">
        <p class="eyebrow">HackathonHelperBot</p>
        <h1>Помощник для участников хакатона</h1>

        <p class="lead">
          Найди команду или создай свою 🚀
        </p>

        <p id="dev-hint" class="hint hidden">
          Локальная отладка: параметры URL <code>api_base</code> и <code>telegram_id</code>.
        </p>
      </div>

      <div class="actions">
        <button id="profile-button" class="button secondary" type="button">👤 Профиль</button>
        <button id="teams-button" class="button primary" type="button">👥 Поиск команды</button>
        <button id="organizer-button" class="button secondary hidden" type="button">📌 Создать хакатон</button>
        <!-- 👇 НОВАЯ КНОПКА -->
        <button id="manage-hackathon-button" class="button secondary hidden" type="button">🛠 Панель организатора</button>
        <button id="captain-button" class="button secondary hidden" type="button">👑 Панель капитана</button>
      </div>
    </section>

    <!-- 👤 ПРОФИЛЬ -->
    <section id="profile-screen" class="screen">
      <div class="topbar">
        <button class="link-button" data-screen="home-screen" type="button">
          ← Назад
        </button>
        <h2>Профиль</h2>
      </div>

      <div id="profile-content" class="panel profile-panel muted">
        Загрузка профиля...
      </div>
    </section>

    <!-- 👥 КОМАНДЫ -->
    <section id="teams-screen" class="screen">
      <div class="topbar">
        <button class="link-button" data-screen="home-screen" type="button">
          ← Назад
        </button>
        <h2>Поиск команды</h2>
      </div>

      <div class="filters">
        <input
          id="team-search"
          class="input"
          type="text"
          placeholder="Поиск по названию, описанию или стеку"
        >

        <select id="tech-stack-filter" class="input">
          <option value="">Все технологии</option>
        </select>
      </div>

      <div id="teams-list" class="team-list"></div>
    </section>

    <!-- 📌 ОРГАНИЗАТОР (создание хакатона) -->
    <section id="organizer-screen" class="screen">
      <div class="topbar">
        <button class="link-button" data-screen="home-screen" type="button">
          ← Назад
        </button>
        <h2>Создать хакатон</h2>
      </div>

      <div id="organizer-content" class="panel muted">
        Загрузка…
      </div>
    </section>

    <!-- 🛠 ПАНЕЛЬ ОРГАНИЗАТОРА (управление существующим хакатоном) -->
    <section id="manage-hackathon-screen" class="screen">
      <div class="topbar">
        <button class="link-button" data-screen="home-screen" type="button">← Назад</button>
        <h2>Управление хакатоном</h2>
      </div>
      <div id="manage-hackathon-panel" class="panel muted">
        Загрузка...
      </div>
    </section>

    <!-- 👑 ПАНЕЛЬ КАПИТАНА -->
    <section id="captain-screen" class="screen">
      <div class="topbar">
        <button class="link-button" data-screen="home-screen" type="button">
          ← Назад
        </button>
        <h2>Панель капитана</h2>
      </div>

      <div id="captain-dashboard" class="panel muted">
        Загрузка...
      </div>
    </section>

  </main>

  <!-- основной модуль Mini App -->
  <script type="module" src="js/main.js"></script>

  <!-- 👇 Скрипт панели организатора -->
  <script src="organizerPanel.js"></script>
</body>
</html>
